<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether — Log · Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Lexend', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #c8c2ba;
  padding: 48px;
  display: flex;
  gap: 48px;
  align-items: flex-start;
}

/* ══ LIGHT TOKEN SET ══ */
.lt {
  --bg:              #f2ede6;
  --panel-bg:        #ebe4dc;
  --s1:              rgba(26,21,18,0.055);
  --s2:              rgba(26,21,18,0.03);
  --bd:              rgba(26,21,18,0.12);
  --bd-dim:          rgba(26,21,18,0.07);
  --green:           #3d9e72;
  --blue:            #3a7bbf;
  --amber:           #c4841a;
  --red:             #c44a4a;
  --tp:              #1a1512;
  --ts:              rgba(26,21,18,0.55);
  --tt:              rgba(26,21,18,0.38);
  --dot-brand:       rgba(26,21,18,0.22);
  --tab-bg:          rgba(26,21,18,0.05);
  --tab-active:      #3a7bbf;
  --hdr-btn-bg:      rgba(26,21,18,0.06);
  --insight-peek-bg: rgba(58,123,191,0.07);
  --insight-peek-bd: rgba(58,123,191,0.18);
  --chip-bg:         rgba(26,21,18,0.03);
  --chip-bd:         rgba(26,21,18,0.10);
  --meta-bg:         rgba(26,21,18,0.03);
  --meta-bd:         rgba(26,21,18,0.07);
  --icon-green-bg:   rgba(61,158,114,0.10);
  --icon-blue-bg:    rgba(58,123,191,0.10);
  --icon-dim-bg:     rgba(26,21,18,0.05);
}

/* ══ PANEL ══ */
.panel {
  width: 320px;
  background: var(--panel-bg);
  border: 1px solid var(--bd);
  border-radius: 20px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  outline: 16px solid var(--bg);
  min-height: 580px;
}

.panel-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--bd-dim);
  flex-shrink: 0;
}

.panel-scroll {
  flex: 1;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow: hidden;
}

/* ══ CHROME ══ */
.aether-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.aether-left { display: flex; align-items: center; gap: 7px; }
.a-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.a-brand {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--tt);
}

/* ══ TYPE ══ */
.screen-title {
  font-family: 'Fraunces', serif;
  font-optical-sizing: auto;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.15;
  color: var(--tp);
  font-size: 32px;
}
.screen-sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--tt);
  margin-top: 4px;
  letter-spacing: 0.04em;
}

/* ══ LOG ENTRIES ══ */
.log-entry {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-left-width: 3px;
  border-radius: 0 12px 12px 0;
  padding: 12px 14px;
  display: flex;
  align-items: flex-start;
  gap: 11px;
}
.entry-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.entry-body { flex: 1; min-width: 0; }
.entry-label {
  font-family: 'DM Mono', monospace;
  font-size: 8.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.entry-text {
  font-size: 13px;
  color: var(--tp);
  font-weight: 400;
  line-height: 1.4;
}
.entry-age {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  flex-shrink: 0;
  margin-top: 2px;
}

/* ══ INSIGHT PEEK ══ */
.insight-peek {
  background: var(--insight-peek-bg);
  border: 1px solid var(--insight-peek-bd);
  border-radius: 9px;
  padding: 8px 11px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  min-height: 44px;
}
.peek-text {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--blue);
  letter-spacing: 0.04em;
  flex: 1;
}
.peek-chev { font-size: 11px; color: var(--tt); }

/* ══ ACTION CHIP ══ */
.action-chip {
  border: 1px solid var(--chip-bd);
  border-radius: 9px;
  padding: 8px 11px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  background: var(--chip-bg);
  min-height: 44px;
}
.chip-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.chip-text {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.03em;
}
.chip-arrow { font-size: 11px; color: var(--tt); margin-left: auto; }

/* ══ META CARD ══ */
.meta-card {
  background: var(--meta-bg);
  border: 1px solid var(--meta-bd);
  border-radius: 9px;
  padding: 9px 11px;
  margin-top: 8px;
}
.meta-row { display: flex; gap: 8px; margin-bottom: 4px; }
.meta-row:last-child { margin-bottom: 0; }
.meta-key {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  color: var(--tt);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  min-width: 52px;
  flex-shrink: 0;
}
.meta-val {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  color: var(--ts);
}

/* ══ TAB BAR ══ */
.tab-bar {
  height: 58px;
  border-top: 1px solid var(--bd-dim);
  background: var(--tab-bg);
  display: flex; align-items: center; justify-content: space-around;
  flex-shrink: 0;
}
.tab { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.tab-lbl { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--tt); }
.tab-lbl.on { color: var(--tab-active); }
.t-base { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<div class="lt">
  <div class="panel">

    <div class="panel-header">
      <div class="aether-row">
        <div class="aether-left">
          <div class="a-dot"></div>
          <span class="a-brand">Aether</span>
        </div>
      </div>
      <div class="screen-title">Log</div>
      <div class="screen-sub">Recent activity</div>
    </div>

    <div class="panel-scroll">

      <!-- SENT -->
      <div class="log-entry" style="border-left-color:var(--green);">
        <div class="entry-icon" style="background:var(--icon-green-bg);">
          <svg width="16" height="16" viewBox="0 0 20 20" class="t-base" stroke="#3d9e72">
            <path d="M3 4h14v10a2 2 0 01-2 2H5a2 2 0 01-2-2V4z"/>
            <polyline points="3,4 10,11 17,4"/>
          </svg>
        </div>
        <div class="entry-body">
          <div class="entry-label" style="color:var(--green);">Sent</div>
          <div class="entry-text">Invoice to Hartwell</div>
        </div>
        <div class="entry-age" style="color:var(--red);">6d ›</div>
      </div>

      <!-- REPLIED + insight peek -->
      <div class="log-entry" style="border-left-color:var(--green);">
        <div class="entry-icon" style="background:var(--icon-green-bg);">
          <svg width="16" height="16" viewBox="0 0 20 20" class="t-base" stroke="#3d9e72">
            <path d="M17 10c0 3.3-3.1 6-7 6L4 18l1.5-3C4 14 3 12.1 3 10c0-3.3 3.1-6 7-6s7 2.7 7 6z"/>
          </svg>
        </div>
        <div class="entry-body">
          <div class="entry-label" style="color:var(--green);">Replied</div>
          <div class="entry-text">Marcus · <span style="color:var(--ts);">#design-reviews</span></div>
          <div class="insight-peek">
            <svg width="11" height="11" viewBox="0 0 20 20" class="t-base" stroke="#3a7bbf">
              <polyline points="3,14 7,9 11,11 17,5"/>
            </svg>
            <span class="peek-text">Pattern found · Marcus messages</span>
            <span class="peek-chev">›</span>
          </div>
        </div>
        <div class="entry-age" style="color:var(--ts);">3d ›</div>
      </div>

      <!-- BOOKED + reschedule chip -->
      <div class="log-entry" style="border-left-color:var(--green);">
        <div class="entry-icon" style="background:var(--icon-green-bg);">
          <svg width="16" height="16" viewBox="0 0 20 20" class="t-base" stroke="#3d9e72">
            <path d="M10 3v14M3 10h14"/>
          </svg>
        </div>
        <div class="entry-body">
          <div class="entry-label" style="color:var(--green);">Booked</div>
          <div class="entry-text">Doctor appointment</div>
          <div style="font-size:12px; color:var(--ts); margin-top:4px; line-height:1.4;">Appointment confirmed — Aetna #4821-JY.</div>
          <div class="action-chip" style="border-color:rgba(58,123,191,0.2);">
            <div class="chip-dot" style="background:var(--blue);"></div>
            <span class="chip-text" style="color:var(--blue);">Reschedule appointment</span>
            <span class="chip-arrow" style="color:var(--blue);">›</span>
          </div>
        </div>
        <div class="entry-age" style="color:var(--red);">12d ›</div>
      </div>

    </div>

    <div class="tab-bar">
      <div class="tab">
        <svg width="19" height="19" viewBox="0 0 20 20" class="t-base" stroke="var(--tt)"><rect x="3" y="3" width="14" height="14" rx="3"/><circle cx="10" cy="10" r="2" fill="var(--tt)" stroke="none"/></svg>
        <div class="tab-lbl">Current</div>
      </div>
      <div class="tab">
        <svg width="19" height="19" viewBox="0 0 20 20" class="t-base" stroke="var(--tab-active)"><line x1="4" y1="6" x2="16" y2="6"/><line x1="4" y1="10" x2="16" y2="10"/><line x1="4" y1="14" x2="16" y2="14"/></svg>
        <div class="tab-lbl on">Log</div>
      </div>
      <div class="tab">
        <svg width="19" height="19" viewBox="0 0 20 20" class="t-base" stroke="var(--tt)"><polyline points="3,14 7,9 11,11 17,5"/><circle cx="17" cy="5" r="1.5"/></svg>
        <div class="tab-lbl">Insights</div>
      </div>
      <div class="tab">
        <svg width="19" height="19" viewBox="0 0 20 20" class="t-base" stroke="var(--tt)"><circle cx="10" cy="7" r="3"/><path d="M4 17c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
        <div class="tab-lbl">You</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
